<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Island Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Fake menu bar */
  .menu-bar {
    width: 100%;
    height: 32px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(30px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    position: relative;
    z-index: 1;
  }
  .menu-bar span {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 500;
  }
  .menu-bar .right {
    display: flex;
    gap: 18px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
  }

  /* Desktop wallpaper area */
  .desktop {
    flex: 1;
    width: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
    position: relative;
  }
  .desktop::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(83, 52, 131, 0.3), transparent 70%),
                radial-gradient(ellipse at 70% 30%, rgba(15, 52, 96, 0.4), transparent 60%);
  }

  /* The island */
  .island-container {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    justify-content: center;
    padding-top: 5px;
  }

  .island {
    background: #000;
    border-radius: 22px;
    height: 34px;
    width: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 2px 20px rgba(0,0,0,0.5), inset 0 0 0 0.5px rgba(255,255,255,0.06);
  }

  .island:hover {
    transform: scale(1.03);
  }

  /* States */
  .island.idle {
    width: 160px;
    height: 34px;
  }

  .island.compact {
    width: 220px;
    height: 38px;
    border-radius: 20px;
  }

  .island.expanded {
    width: 360px;
    height: 80px;
    border-radius: 28px;
  }

  .island.large {
    width: 380px;
    height: 160px;
    border-radius: 32px;
  }

  /* Content inside island */
  .island-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 16px;
    width: 100%;
    height: 100%;
    opacity: 1;
    transition: opacity 0.2s ease;
  }

  .island-content.hidden {
    opacity: 0;
    position: absolute;
    pointer-events: none;
  }

  /* Camera dot */
  .camera-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #1a1a2e;
    border: 1.5px solid #2a2a3e;
    flex-shrink: 0;
  }

  /* Hot mic indicator */
  .mic-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .mic-icon svg { fill: #8b5cf6; }

  .mic-label {
    color: rgba(255,255,255,0.9);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Audio waveform */
  .waveform {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 20px;
  }
  .waveform .bar {
    width: 3px;
    border-radius: 2px;
    background: #8b5cf6;
    animation: wave 0.8s ease-in-out infinite;
  }
  .waveform .bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .waveform .bar:nth-child(2) { height: 12px; animation-delay: 0.1s; }
  .waveform .bar:nth-child(3) { height: 18px; animation-delay: 0.2s; }
  .waveform .bar:nth-child(4) { height: 10px; animation-delay: 0.3s; }
  .waveform .bar:nth-child(5) { height: 14px; animation-delay: 0.15s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* Transcription state */
  .transcription-content {
    flex-direction: column;
    align-items: flex-start;
    padding: 12px 18px;
    gap: 6px;
  }
  .transcription-top {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .transcription-text {
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    line-height: 1.4;
    overflow: hidden;
    max-width: 100%;
  }
  .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 13px;
    background: #8b5cf6;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Clipboard state */
  .clipboard-content {
    flex-direction: column;
    padding: 14px 18px;
    gap: 8px;
  }
  .clipboard-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .clipboard-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(139, 92, 246, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .clipboard-icon svg { width: 16px; height: 16px; fill: #8b5cf6; }
  .clipboard-meta {
    flex: 1;
    min-width: 0;
  }
  .clipboard-meta .title {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .clipboard-meta .subtitle {
    color: rgba(255,255,255,0.45);
    font-size: 11px;
  }
  .clipboard-preview {
    width: 100%;
    padding: 8px 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    font-family: 'SF Mono', 'Menlo', monospace;
    line-height: 1.4;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  /* Success flash */
  .success-ring {
    position: absolute;
    inset: -2px;
    border-radius: inherit;
    border: 2px solid #10b981;
    opacity: 0;
    animation: flash 0.6s ease-out;
  }
  @keyframes flash {
    0% { opacity: 0.8; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.05); }
  }

  /* Progress bar */
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: linear-gradient(90deg, #8b5cf6, #a78bfa);
    border-radius: 0 0 0 28px;
    transition: width 0.3s ease;
  }

  /* Controls */
  .controls {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 200;
  }
  .controls button {
    padding: 10px 20px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .controls button:hover {
    background: rgba(255,255,255,0.14);
    color: #fff;
  }
  .controls button.active {
    background: rgba(139, 92, 246, 0.3);
    color: #c4b5fd;
    border-color: rgba(139, 92, 246, 0.4);
  }

  .hint {
    position: fixed;
    bottom: 16px;
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    z-index: 200;
  }
</style>
</head>
<body>

<div class="menu-bar">
  <span>Field Theory</span>
  <div class="right">
    <span>100%</span>
    <span>Wi-Fi</span>
    <span id="clock"></span>
  </div>
</div>

<div class="desktop"></div>

<div class="island-container">
  <div class="island idle" id="island">

    <!-- Idle state -->
    <div class="island-content" id="state-idle">
      <div class="camera-dot"></div>
    </div>

    <!-- Hot mic listening -->
    <div class="island-content hidden" id="state-hotmic">
      <div class="mic-icon">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </div>
      <div class="waveform">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <span class="mic-label">Listening</span>
    </div>

    <!-- Transcribing -->
    <div class="island-content hidden transcription-content" id="state-transcribing">
      <div class="transcription-top">
        <div class="mic-icon">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" fill="#8b5cf6"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" fill="#8b5cf6"/></svg>
        </div>
        <span class="mic-label" style="flex:1">Transcribing</span>
        <div class="waveform" style="transform:scale(0.8)">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
      </div>
      <div class="transcription-text">
        <span id="typed-text"></span><span class="typing-cursor"></span>
      </div>
      <div class="progress-bar" id="progress" style="width:0%"></div>
    </div>

    <!-- Clipboard copied -->
    <div class="island-content hidden clipboard-content" id="state-clipboard">
      <div class="clipboard-row">
        <div class="clipboard-icon">
          <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </div>
        <div class="clipboard-meta">
          <div class="title">Copied to clipboard</div>
          <div class="subtitle">from VS Code &middot; just now</div>
        </div>
      </div>
      <div class="clipboard-preview">const handleTranscription = async (audio: Buffer) =&gt; { ... }</div>
    </div>

  </div>
</div>

<div class="controls">
  <button class="active" onclick="setState('idle')">Idle</button>
  <button onclick="setState('hotmic')">Hot Mic</button>
  <button onclick="setState('transcribing')">Transcribing</button>
  <button onclick="setState('clipboard')">Clipboard</button>
  <button onclick="runSequence()">Auto Demo</button>
</div>

<div class="hint">Click states below or run Auto Demo</div>

<script>
const island = document.getElementById('island');
const states = ['idle', 'hotmic', 'transcribing', 'clipboard'];
let currentState = 'idle';
let typingInterval = null;

const transcriptText = "Hey can you open the settings panel and check the audio input device";

function setState(state) {
  if (typingInterval) { clearInterval(typingInterval); typingInterval = null; }

  // Update buttons
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  const buttons = document.querySelectorAll('.controls button');
  const idx = states.indexOf(state);
  if (idx >= 0) buttons[idx].classList.add('active');

  // Hide all content
  states.forEach(s => {
    document.getElementById('state-' + s).classList.add('hidden');
  });

  // Remove old size classes
  island.className = 'island';

  // Show new state
  switch(state) {
    case 'idle':
      island.classList.add('idle');
      document.getElementById('state-idle').classList.remove('hidden');
      break;

    case 'hotmic':
      island.classList.add('compact');
      document.getElementById('state-hotmic').classList.remove('hidden');
      break;

    case 'transcribing':
      island.classList.add('expanded');
      document.getElementById('state-transcribing').classList.remove('hidden');
      startTyping();
      break;

    case 'clipboard':
      island.classList.add('large');
      document.getElementById('state-clipboard').classList.remove('hidden');
      // Flash success
      const ring = document.createElement('div');
      ring.className = 'success-ring';
      island.appendChild(ring);
      setTimeout(() => ring.remove(), 700);
      break;
  }

  currentState = state;
}

function startTyping() {
  const el = document.getElementById('typed-text');
  const prog = document.getElementById('progress');
  el.textContent = '';
  let i = 0;
  typingInterval = setInterval(() => {
    if (i < transcriptText.length) {
      el.textContent += transcriptText[i];
      i++;
      prog.style.width = Math.round((i / transcriptText.length) * 100) + '%';
    } else {
      clearInterval(typingInterval);
      typingInterval = null;
    }
  }, 50);
}

async function runSequence() {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.controls button')[4].classList.add('active');

  setState('idle');
  await wait(1200);
  setState('hotmic');
  await wait(2500);
  setState('transcribing');
  await wait(4500);
  setState('clipboard');
  await wait(3000);
  setState('idle');
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 60000);

// Click island to cycle
island.addEventListener('click', () => {
  const next = states[(states.indexOf(currentState) + 1) % states.length];
  setState(next);
});
</script>

</body>
</html>
