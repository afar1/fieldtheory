<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - Field Theory</title>
  <meta name="description" content="About the developer of Field Theory.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-logo"><img id="nav-logo-img" src="images/fieldtheory-logo-black.png" alt="Field Theory" class="nav-logo-img"></a>
      <ul class="nav-links">
        <li><a href="/#pricing">Pricing</a></li>
        <li><a href="/#download">Download</a></li>
        <li><a href="theory.html">Theory</a></li>
        <li><button class="theme-toggle" onclick="toggleTheme()">◐</button></li>
      </ul>
    </div>
  </nav>

  <!-- About Content -->
  <main class="theory-content">
    <h1>About the developer</h1>

    <div class="faq-list">
      <p>Field Theory is an indie project made by <a href="https://x.com/andrewfarah" class="link-primary">Andrew Farah</a>. Andrew is based in San Francisco, CA.</p>
    </div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-content">
        <p class="footer-copyright"><span class="footer-brand">Field Theory</span> &copy; 2026 <span class="footer-divider">|</span> <a href="mailto:support@fieldtheory.dev" class="footer-email">support@fieldtheory.dev</a></p>
        <ul class="footer-links">
          <li><a href="/#pricing">Pricing</a></li>
          <li><a href="/#download">Download</a></li>
          <li><a href="faq.html">FAQ</a></li>
          <li><a href="theory.html">Theory</a></li>
          <li><a href="about.html">About</a></li>
          <li><button class="theme-toggle" onclick="toggleTheme()">◐</button></li>
        </ul>
      </div>
    </div>
  </footer>

  <!-- Theme toggle script -->
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      // Update logo based on theme
      const logoImg = document.getElementById('nav-logo-img');
      if (logoImg) {
        logoImg.src = isDark ? 'images/fieldtheory-logo-white.png' : 'images/fieldtheory-logo-black.png';
      }
    }

    // Update logo on page load based on saved theme
    (function() {
      const isDark = document.body.classList.contains('dark');
      const logoImg = document.getElementById('nav-logo-img');
      if (logoImg) {
        logoImg.src = isDark ? 'images/fieldtheory-logo-white.png' : 'images/fieldtheory-logo-black.png';
      }
    })();
  </script>

</body>
</html>
