<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Field Theory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #f8fafc;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: #1e293b;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid #334155;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #0f172a;
      color: #f8fafc;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    input::placeholder {
      color: #64748b;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #2563eb;
    }

    .btn-primary:active:not(:disabled) {
      transform: scale(0.98);
    }

    .error {
      background: #7f1d1d;
      border: 1px solid #dc2626;
      color: #fecaca;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .success {
      background: #14532d;
      border: 1px solid #22c55e;
      color: #bbf7d0;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }

    .success-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .success h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .success p {
      color: #86efac;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .password-requirements {
      font-size: 12px;
      color: #64748b;
      margin-top: 8px;
    }

    .invalid-link {
      text-align: center;
      padding: 24px 0;
    }

    .invalid-link-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .invalid-link h2 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .invalid-link p {
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🎙️</div>
      <div class="logo-text">Field Theory</div>
    </div>

    <div id="content">
      <!-- Content populated by JavaScript -->
    </div>
  </div>

  <!-- Supabase JS SDK loaded from CDN. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Parse the URL hash to extract access_token and refresh_token.
    // Supabase sends: #access_token=...&refresh_token=...&type=recovery
    function parseHashParams() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      return {
        accessToken: params.get('access_token'),
        refreshToken: params.get('refresh_token'),
        type: params.get('type'),
      };
    }

    // Initialize Supabase client.
    // These are public (anon) credentials - safe for client-side use.
    const SUPABASE_URL = 'https://FIELD_THEORY_SUPABASE_URL.example';
    const SUPABASE_ANON_KEY = 'FIELD_THEORY_SUPABASE_ANON_KEY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM content container.
    const contentEl = document.getElementById('content');

    // Show invalid link state.
    function showInvalidLink() {
      contentEl.innerHTML = `
        <div class="invalid-link">
          <div class="invalid-link-icon">⚠️</div>
          <h2>Invalid Reset Link</h2>
          <p>This password reset link is invalid or has expired.</p>
          <p style="margin-top: 12px;">Please request a new password reset from the app.</p>
        </div>
      `;
    }

    // Show error message.
    function showError(message) {
      const errorDiv = document.querySelector('.error');
      if (errorDiv) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
      }
    }

    // Show password reset form.
    function showResetForm() {
      contentEl.innerHTML = `
        <h1>Reset Your Password</h1>
        <p class="subtitle">Enter your new password below.</p>

        <form id="resetForm">
          <div class="error" style="display: none;"></div>
          
          <div class="form-group">
            <label for="password">New Password</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Enter new password"
              required
              minlength="8"
              autocomplete="new-password"
            />
            <p class="password-requirements">At least 8 characters</p>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input 
              type="password" 
              id="confirmPassword" 
              name="confirmPassword" 
              placeholder="Confirm new password"
              required
              minlength="8"
              autocomplete="new-password"
            />
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">
            Reset Password
          </button>
        </form>
      `;

      // Attach form handler.
      document.getElementById('resetForm').addEventListener('submit', handleSubmit);
    }

    // Show success state.
    function showSuccess() {
      contentEl.innerHTML = `
        <div class="success">
          <div class="success-icon">✓</div>
          <h2>Password Updated</h2>
          <p>Your password has been reset successfully.</p>
          <p style="margin-top: 12px;">You can now sign in with your new password in Field Theory.</p>
        </div>
      `;
    }

    // Handle form submission.
    async function handleSubmit(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');
      const errorDiv = document.querySelector('.error');

      // Hide previous error.
      errorDiv.style.display = 'none';

      // Validate passwords match.
      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      // Validate minimum length.
      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      // Show loading state.
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"><span class="spinner"></span> Updating...</span>';

      try {
        // Update password via Supabase.
        const { error } = await supabase.auth.updateUser({ password });

        if (error) {
          throw error;
        }

        // Success - show confirmation.
        showSuccess();
      } catch (err) {
        console.error('Password reset error:', err);
        showError(err.message || 'Failed to reset password. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    }

    // Initialize on page load.
    async function init() {
      const { accessToken, refreshToken, type } = parseHashParams();

      // Validate we have the required tokens for a password recovery.
      if (!accessToken || !refreshToken || type !== 'recovery') {
        showInvalidLink();
        return;
      }

      try {
        // Set the session with the recovery tokens.
        // This authenticates the user so updateUser() will work.
        const { error } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken,
        });

        if (error) {
          console.error('Session error:', error);
          showInvalidLink();
          return;
        }

        // Session set successfully - show the reset form.
        showResetForm();
      } catch (err) {
        console.error('Init error:', err);
        showInvalidLink();
      }
    }

    // Run init when DOM is ready.
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
